version: "3.9"

networks:
  tp3iw_esgi_net:
    driver: bridge

volumes:
  mysql_data:
  esgi_tp_final_cache:

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tp3iw_esgi_net

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    hostname: esgi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3307"
    command: ["--port=3307"]
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tp3iw_esgi_net

  php1:
    build:
      context: .
      dockerfile: php/Dockerfile
    image: php-laravel-esgi
    container_name: php1
    depends_on:
      - mysql-db
    command: ["sh", "/usr/local/bin/init-laravel-3iw.sh"]
    volumes:
      - .:/var/www/html
      - esgi_tp_final_cache:/var/cache:ro
    environment:
      APP_SERVER_NAME: "Serveur 1"
    networks:
      - tp3iw_esgi_net

  php2:
    image: php-laravel-esgi
    container_name: php2
    depends_on:
      - mysql-db
    command: ["sh", "/usr/local/bin/init-laravel-3iw.sh"]
    volumes:
      - .:/var/www/html
      - esgi_tp_final_cache:/var/cache:ro
    environment:
      APP_SERVER_NAME: "Serveur 2"
    networks:
      - tp3iw_esgi_net

  nginx1:
    build:
      context: .
      dockerfile: nginx-image/Dockerfile
    image: custom-nginx-esgi
    container_name: nginx1
    depends_on:
      - php1
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./nginx/nginx1.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tp3iw_esgi_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx1.rule=Host(`nginx1.localhost`)"
      - "traefik.http.routers.nginx1.entrypoints=web"

  nginx2:
    image: custom-nginx-esgi
    container_name: nginx2
    depends_on:
      - php2
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./nginx/nginx2.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tp3iw_esgi_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx2.rule=Host(`nginx2.localhost`)"
      - "traefik.http.routers.nginx2.entrypoints=web"
